version: '3.9'

services:
  web:
    image: nginx:alpine
    container_name: demo-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    restart: always
    networks:
      - demo-net

  app:
    build: ./app
    container_name: demo-app
    environment:
      APP_MESSAGE: ${APP_MESSAGE}
      REDIS_HOST: redis
    volumes:
      - ./app:/app
      - ./logs:/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    networks:
      - demo-net

  redis:
    image: redis:7-alpine
    container_name: demo-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - demo-net

networks:
  demo-net:

volumes:
  redis-data:
