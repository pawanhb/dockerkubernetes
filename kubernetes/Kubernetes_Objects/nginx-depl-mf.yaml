apiVersion: apps/v1
kind: Deployment
metadata: 
  name: nginx-deploy
  labels:
    app:  nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  template: 
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - image: nginx:1.27.0-alpine
        name: nginx-container
        ports:
        - containerPort: 80
