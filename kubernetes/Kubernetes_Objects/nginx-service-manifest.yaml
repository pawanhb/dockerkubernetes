#kubectl expose pod nginx-pod --type=NodePort --port=80

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: nginx-app
  annotations:
    description: 'Kubernetes service for exposing nginx-pod'
spec:
  type: NodePort
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: nginx-app
  

