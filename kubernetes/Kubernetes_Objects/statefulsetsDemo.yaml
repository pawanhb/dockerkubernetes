apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  labels:
    app: nginx-statefulset
spec:
  clusterIP: None
  selector:
    app: nginx-statefulset-pod
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-stateful
spec:
  selector:
    matchLabels:
      app: nginx-statefulset-pod
  serviceName: nginx-headless
  replicas: 3
  template:
    metadata:
      labels:
        app: nginx-statefulset-pod
    spec:
      containers:
      - name: nginx-stateful-pod-c
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: web
        volumeMounts:
        - name: data
          mountPath: /usr/share/nginx/html
      volumes:
        - name: data
          emptyDir: {}

