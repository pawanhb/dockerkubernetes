apiVersion: v1
kind: Pod
metadata:
  name: nginx-multi-container
  labels:
    app: nginx-demo
spec:
  containers:
  - name: nginx-1
    image: nginx
    ports:
    - containerPort: 80

  - name: nginx-2
    image: nginx
    ports:
    - containerPort: 81
    volumeMounts:
    - name: nginx-81-config
      mountPath: /etc/nginx/conf.d

  volumes:
  - name: nginx-81-config
    configMap:
      name: nginx-81-config

