apiVersion: apps/v1
kind: Deployment
metadata:
  name: ns-a-deployment
  namespace: ns-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ns-a
  template:
    metadata:
      labels:
        app: ns-a 
    spec:
      containers:
      - image: nginx
        name: ns-a-pod
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata: 
  name: ns-a-service
  namespace: ns-a
spec:
  selector:
    app: ns-a
  ports:
  - port: 80
    targetPort: 80
