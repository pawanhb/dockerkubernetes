apiVersion: v1
kind: Pod
metadata:
  name: startup-probe-demo
spec:
  containers:
  - name: startup-demo-container
    image: busybox
    command: ['sh', '-c', 'echo "Starting application..."; sleep 30; touch /tmp/startup-successful; sleep 3600']
    startupProbe:
      exec:
        command:
        - cat
        - /tmp/startup-successful
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 2
      timeoutSeconds: 1

