apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: dev
  labels:
    app: nginx-pod
spec:
  containers:
  - image: nginx
    name: nginx-container
    ports:
    - containerPort: 80
    resources:
      requests:
        cpu: '0.25'
        memory: '256Mi'
      limits:
        cpu: '0.5'
        memory: '512Mi'
