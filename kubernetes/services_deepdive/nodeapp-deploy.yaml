apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapp-deploy
  labels:
    app: node-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - image: pawanhb/nodeapp
        name: node-app-container
        ports:
        - containerPort: 80
