apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-volume
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: local-storage
  local: 
    path: /mnt/disk/local1
  nodeAffinity: 
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: ['minikube']

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-volume-claim
spec:
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage


---
apiVersion: v1
kind: Pod
metadata:
  name: local-volume-pod
  labels:
    app.kubernetes.io/name: local-volume
spec:
  containers:
  - name: myapp
    image: busybox
    command:
      - "sh"
      - "-c"
      - "sleep 3600"
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    volumeMounts:
    - name: local-volume
      mountPath: /mnt/local
  volumes:
  - name: local-volume
    persistentVolumeClaim:
      claimName: local-volume-claim



