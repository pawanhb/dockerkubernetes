apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx-deployment-object
  annotations:
    "kubernetes.io/change-cause": "upgrade to 1.27.1"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx-pods
  template:
    metadata: 
      labels:
        app: nginx-pods
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.1
  strategy:
    type: RollingUpdate