#Equivalent of running POD kubectl run nginx-pod --image=nginx:1.27.0

apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod-prod
  labels:
    env: prod
spec:
  containers:
  - name: nginx-container
    image: nginx:1.27.0-alpine
    ports:
      - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  labels: 
    app: nginx-service
spec:
  selector:
    env: prod
  ports:
  - port: 80
    targetPort: 80
