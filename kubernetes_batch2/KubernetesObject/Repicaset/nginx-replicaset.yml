apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  labels:
    app: nginx-replicaset
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-pods
  template:
    metadata: 
      labels:
        app: nginx-pods
    spec: 
      containers:
        - name: nginx
          image: nginx:1.27.0