apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: quota-demo-ns
  labels:
    app: resource-quota-demo
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    ports:
      - containerPort: 80
