apiVersion: v1
kind: Pod
metadata:
  name: unscheduled-pod
  namespace: quota-demo-ns
  labels:
    app: resource-quota-demo
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      requests:
        cpu: "900m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"
    ports:
      - containerPort: 80
