apiVersion: v1
kind: Pod
metadata:
  name: readiness-demo
  labels:
    app: readiness-demo

spec:
  containers:
  - name: app
    image: busybox

    args:
    - /bin/sh
    - -c
    - |
      sleep 20;
      touch /tmp/ready;
      sleep 600;

    readinessProbe:
      exec:
        command:
        - cat
        - /tmp/ready

      initialDelaySeconds: 5
      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: readiness-service

spec:
  selector:
    app: readiness-demo

  ports:
  - port: 80
    targetPort: 80