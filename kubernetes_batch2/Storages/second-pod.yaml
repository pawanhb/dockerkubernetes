apiVersion: v1
kind: Pod
metadata:
  name: second-pod
  labels:
    app: local-volume-demo
spec:
  containers:
  - name: local-volume-pod-2
    image: busybox
    command: ["sh", "-c", "sleep 3600"]
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    volumeMounts:
    - name: local-volume
      mountPath: /mnt/container2/path
  volumes:
  - name: local-volume
    persistentVolumeClaim:
      claimName: local-volume-pvc